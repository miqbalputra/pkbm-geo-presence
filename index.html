<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon_pwa.png" />
    <link rel="apple-touch-icon" href="/icon_pwa.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geo Presensi PKBM Tunas Ilmu</title>
    <script>
      // ============================================================
      // SELF-HEALING: Deteksi blank page → clear cache → reload
      // Mencegah PWA stuck blank putih karena cache Service Worker lama
      // ============================================================
      (function () {
        var HEAL_KEY = 'sw_self_heal_attempt';
        var MAX_RETRIES = 2;

        function heal() {
          var attempt = parseInt(sessionStorage.getItem(HEAL_KEY) || '0', 10);
          if (attempt >= MAX_RETRIES) {
            sessionStorage.removeItem(HEAL_KEY);
            return;
          }
          sessionStorage.setItem(HEAL_KEY, String(attempt + 1));

          var tasks = [];
          if ('caches' in window) {
            tasks.push(
              caches.keys().then(function (names) {
                return Promise.all(names.map(function (n) { return caches.delete(n); }));
              })
            );
          }
          if ('serviceWorker' in navigator) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              })
            );
          }
          Promise.all(tasks).catch(function () {}).then(function () {
            location.reload();
          });
        }

        // Cek setelah 8 detik apakah app benar-benar sudah render dan loading
        // fallback sudah dihapus. Jika masih stuck, bersihkan cache/PWA lama.
        setTimeout(function () {
          var root = document.getElementById('root');
          var loading = document.getElementById('app-loading');
          if (!root || root.children.length === 0 || loading) {
            console.warn('[Self-Heal] App/loading fallback masih stuck, memperbaiki cache...');
            heal();
          } else {
            sessionStorage.removeItem(HEAL_KEY);
          }
        }, 8000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Loading fallback (inline style, dihapus setelah React render) -->
    <div id="app-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f8fafc;z-index:9999">
      <div style="width:40px;height:40px;border:4px solid #c7d2fe;border-top-color:#4f46e5;border-radius:50%;animation:app-spin 0.8s linear infinite"></div>
    </div>
    <script>
      // Animasi spinner (inline, tidak pakai <style> tag agar Vite build tidak error)
      (function(){
        var s = document.createElement('style');
        s.textContent = '@keyframes app-spin{to{transform:rotate(360deg)}}';
        document.head.appendChild(s);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
